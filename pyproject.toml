"pdomain_book_tools/pgdp/pgdp_results.py" = ["ANN", "D", "G003", "G004", "BLE001", "TRY", "PERF401", "S108"]
"pdomain_book_tools/ocr/doctr_support.py" = ["F401", "ANN", "D", "G003", "G004", "BLE001", "TRY"]
"pdomain_book_tools/ocr/word.py" = ["ANN", "D", "G003", "G004", "PERF401", "BLE001"]

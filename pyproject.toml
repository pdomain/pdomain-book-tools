"pdomain_book_tools/ocr/block.py" = ["ANN", "D", "G003", "G004", "BLE001", "TRY", "PERF401"]
"pdomain_book_tools/ocr/image_utilities.py" = ["ANN", "D", "G003", "G004", "BLE001", "TRY"]
"pdomain_book_tools/layout/types.py" = ["ANN", "D"]
"pdomain_book_tools/image_processing/cupy_processing/color_to_gray.py" = ["N806", "ANN", "D", "G003", "G004"]
"pdomain_book_tools/hf/download.py" = ["N806", "ANN", "D", "G003", "G004", "BLE001", "TRY", "S110"]

name: ci

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Chore: review pinned action SHAs weekly. Update the version comment and the
# full commit SHA together after checking the upstream release tag.

env:
  CUDA_VISIBLE_DEVICES: ""

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.1.0
        with:
          version: "0.11.29"
      - run: make setup
      - name: Run pre-commit hooks
        run: SKIP=basedpyright uv run pre-commit run --all-files

  lint:
    name: lint
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.1.0
        with:
          version: "0.11.29"
      - run: make setup
      - run: make lint-check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.1.0
        with:
          version: "0.11.29"
      - run: make setup
      - run: make typecheck

  test:
    name: "test / py${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      UV_PYTHON: "${{ matrix.python-version }}"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.1.0
        with:
          version: "0.11.29"
      - run: make setup
      - run: make test

  build:
    name: build
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.1.0
        with:
          version: "0.11.29"
      - run: make setup
      - run: make build

  layout-fork:
    name: layout fork
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.1.0
        with:
          version: "0.11.29"
      - run: make setup
      - run: make layout-fork-info

name: ci

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CUDA_VISIBLE_DEVICES: ""

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      # Pin to immutable commit SHA for supply-chain hardening (#196).
      # actions/checkout v4 tag -> 34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      # astral-sh/setup-uv v7.6.0 -> 37802adc94f370d6bfd71619e3f0bf239e1f3b78
      # To upgrade: find the new tag's commit SHA in astral-sh/setup-uv, update both SHA and comment.
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          version: "0.11.16"
      - run: make setup
      - name: Run pre-commit hooks
        run: SKIP=basedpyright uv run pre-commit run --all-files

  lint:
    name: lint
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          version: "0.11.16"
      - run: make setup
      - run: make lint-check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          version: "0.11.16"
      - run: make setup
      - run: make typecheck

  test:
    name: "test / py${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      UV_PYTHON: "${{ matrix.python-version }}"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          version: "0.11.16"
      - run: make setup
      - run: make test

  build:
    name: build
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          version: "0.11.16"
      - run: make setup
      - run: make build

  layout-fork:
    name: layout fork
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          version: "0.11.16"
      - run: make setup
      - run: make layout-fork-info

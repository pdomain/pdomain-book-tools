name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.13"
      CUDA_VISIBLE_DEVICES: ""
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - run: make ci
